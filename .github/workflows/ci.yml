name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Compose project
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate configuration
        shell: bash
        run: |
          set -o pipefail
          ./scripts/check.sh 2>&1 | tee ci-validation.log

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-validation-log
          path: ci-validation.log
          if-no-files-found: error
          retention-days: 3
