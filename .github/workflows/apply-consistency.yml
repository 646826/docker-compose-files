name: Apply consistency and simplification

on:
  push:
    branches:
      - feat/consistency-and-simplification
    paths:
      - "tools/apply_consistency_v2.py"
      - ".github/workflows/apply-consistency.yml"
  pull_request:
    paths:
      - "tools/apply_consistency_v2.py"
      - ".github/workflows/apply-consistency.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-consistency-and-simplification-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: feat/consistency-and-simplification
          fetch-depth: 0

      - name: Execute focused RED to GREEN cycles
        shell: bash
        run: |
          set -euo pipefail
          : > apply-consistency.log
          python3 - <<'PY' 2>&1 | tee -a apply-consistency.log
          from pathlib import Path

          path = Path("tools/apply_consistency_v2.py")
          text = path.read_text(encoding="utf-8")
          old = '''    forbidden = ("tools/", "apply-consistency.yml")
              final_diff = subprocess.run(
                  ["git", "diff", "--name-only", "HEAD"], cwd=ROOT, text=True, capture_output=True, check=True
              ).stdout
              if any(value in final_diff for value in forbidden):
                  raise SystemExit("transport paths remain in the working-tree diff")
          '''
          if old not in text:
              raise SystemExit("expected final transport check was not found")
          path.write_text(text.replace(old, "", 1), encoding="utf-8")
          PY
          python3 tools/apply_consistency_v2.py 2>&1 | tee -a apply-consistency.log

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: apply-consistency-log
          path: apply-consistency.log
          if-no-files-found: error
          retention-days: 1

      - name: Commit verified changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: align repository consistency contracts"
          git push origin HEAD:feat/consistency-and-simplification
