name: Apply consistency and simplification

on:
  push:
    branches:
      - feat/consistency-and-simplification
    paths:
      - "tools/apply_consistency_changes.py"
      - ".github/workflows/apply-consistency.yml"
  pull_request:
    paths:
      - "tools/apply_consistency_changes.py"
      - ".github/workflows/apply-consistency.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-consistency-and-simplification-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: feat/consistency-and-simplification
          fetch-depth: 0

      - name: Adapt the staged applicator to the current tree
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("tools/apply_consistency_changes.py")
          text = path.read_text(encoding="utf-8")

          old_comment_block = '''    replace_exact(
                  "scripts/init.sh",
                  "# mosquitto_passwd -U is intentionally not executed: the official Mosquitto\\n"
                  "# 2.1.2 images do not compile Argon2 support, so create a supported PBKDF2 file.\\n",
                  "# The official Mosquitto 2.1.2 images do not compile Argon2 support, so create\\n"
                  "# a supported SHA512-PBKDF2 password file directly with an explicit work factor.\\n",
              )
          '''
          new_comment_block = '''    old_comment = (
                  "# mosquitto_passwd -U is intentionally not executed: the official Mosquitto\\n"
                  "# 2.1.2 images do not compile Argon2 support, so create a supported PBKDF2 file.\\n"
              )
              new_comment = (
                  "# The official Mosquitto 2.1.2 images do not compile Argon2 support, so create\\n"
                  "# a supported SHA512-PBKDF2 password file directly with an explicit work factor.\\n"
              )
              init_text = read("scripts/init.sh")
              if old_comment in init_text:
                  write("scripts/init.sh", init_text.replace(old_comment, new_comment, 1))
              elif new_comment not in init_text:
                  raise SystemExit("scripts/init.sh contains neither expected Mosquitto comment")
          '''
          if old_comment_block not in text:
              raise SystemExit("expected phase-one comment replacement block was not found")
          text = text.replace(old_comment_block, new_comment_block, 1)

          old_import = '''        "from scripts.check_images import (  # noqa: E402\\n"
                  "    compose_images,\\n",
          '''
          new_import = '''        "from scripts.check_images import (  # noqa: E402\\n"
                  "    BACKUP_HELPER_IMAGE,\\n"
                  "    compose_images,\\n",
          '''
          if old_import not in text:
              raise SystemExit("expected image-test import replacement was not found")
          text = text.replace(old_import, new_import, 1)

          incomplete_replacement = '''        "from scripts.check_images import (  # noqa: E402\\n"
                  "    PLACEHOLDER_SECRETS,\\n"
                  "    compose_images,\\n",
          '''
          complete_replacement = '''        "from scripts.check_images import (  # noqa: E402\\n"
                  "    PLACEHOLDER_SECRETS,\\n"
                  "    BACKUP_HELPER_IMAGE,\\n"
                  "    compose_images,\\n",
          '''
          if incomplete_replacement not in text:
              raise SystemExit("expected image-test replacement output was not found")
          text = text.replace(incomplete_replacement, complete_replacement, 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Execute focused RED to GREEN cycles
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/apply_consistency_changes.py 2>&1 | tee apply-consistency.log

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: apply-consistency-log
          path: apply-consistency.log
          if-no-files-found: error
          retention-days: 1

      - name: Commit verified changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: align repository consistency contracts"
          git push origin HEAD:feat/consistency-and-simplification
